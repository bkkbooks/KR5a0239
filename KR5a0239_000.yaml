body:
  text: 元陽子金液集還丹金液歌注元陽子金液集真隂真陽是真道只在眼前何遠討凡流歲歲燒還丹或見靑黃自云好真隂者聖人只說北方壬癸水是五行之首隂君曰北方正氣為河卓東方甲乙生金砂說此一物者為五行之首訣曰北方有水水中有金金始隄防水中有金呼名為庚辛之金其卦屬坎宮也真陽者南方熒惑星是也生自甲乙寄位丙丁燧人能發其光變化生為熟名為太陽之精卦屬離宮內有砂汞時人不可知之世人不達其理遂將雜物及朱砂水銀修之為至藥忽見靑黃之色自言其藥好矣志士應須承怯則莫損心神須見道但知求得真黃芽人得食之壽無老注曰志士須知規則而行規則者即是天地之機也運動法象火候進退皆似連珠合璧忽聚或散往來出入貫串內外相應更無差失測候及時即成王藥古訣云失在抽添得在受氣得王成寶號為真黃芽者且不以凡物製造得成此物是天地之精微妙之氣結成凡人極難會所以云莫損心神須見道黃芽不與世鉛同徒以勞神不見功虛失光隂生白首何處悠悠訪赤松黃芽者不是世間黑鉛黃丹燒成黃芽出自太陽之內從虛無而生歸在中宮黃帝之位道德經云狀若眀窗塵故非世人家所有之物淮南子赤松子知之赤松子者即是淮南王也訣云准南王鍊秋石呼黃帝美金花更無別道志士不知此真訣徙自一生白首所以受之歸身師師者是口訣也神水華池世所稀流傳不許俗人知還將世上凡鉛汞相似令教人不疑神水華池者出自太陽之內為火之精仙人採用號為神水華池其精凝白似馬牙硝未伏火者若經鍊之後呼為金液華池名為真鉛亦名白虎若修之後即汞無黑色若要住火感應只在咫尺間此在口訣難以書傳仙人將黑鉛和水銀採神符白雪相似令教人不疑如用黑鉛水銀皆不是真法縱遇至人終日相隨與至道不相契終不傳付此術注訣只要世人悟會自是人之根性與至道不相契會聖人終不欲令其絶於後代所以三百二百年方傳一人夫學道之人切須廣修隂德見於道師敬如父母首尾相似不辭辛勤得此方可傳授參同契云虛有好道之名珠無鍊丹之志未有小失便起大怨如此之人去道逺矣青龍逐虎虎隨龍赤禽交會聲嗈嗈調氣運火逐離宮丹砂入腹身自沖青龍者是木也位在東方甲乙之宮卦主震內含離氣為太陽之精赤禽之志其性猛急聖人呼為汞白虎者是西方金神位在庚辛之上卦在兌此金無形質生北方壬癸水中煆鍊之後則永無黑色名為白虎亦名金液此物能尅東方甲乙之木當兩情相尅之時自有聲爆動驚人星曜流暉當此之時即便交會自然相合體似琉璃未交會其色凝白食木精之後色乃方變為甲乙之色青龍也調氣運火逐離宮起自復卦一陽爻生相次運行周而復姑連珠合璧或聚或散往來貫串出入無定若運行度差錯即退而不要無論年月終不成也參同契云三日月出庚狀象釣八日上弦平如繩十五日乾體就十六日相次缺至二十三日為之下弦到二十七日沒也故云滅沒也此數合在口訣太陽初出東都桃山上應中國酉時雞盡鳴唯有戌亥子三時是絶聲之處世人只聽凡聲未辨三時之說但解明雞法霄漢亦相侔矣月初出之時前後各餘三日只明二十四日學道之人不知此要徒用一生至功內迷者不可知矣五行深妙義難知龍虎隱藏在坎離還丹之術數過百最妙須得金華池五行者是金木水火土龍藏者藏在坎離宮離卦二陽一隂內虛受其龍也龍者火也火者汞也名為姹女若見白虎即便受胎十月滿足自然相生白金生水中坎卦二隂一陽爻金在水中不現其形唯有一法採而取之名為真鉛即是水火二性為之隂陽更無雜物隂符經云金丹之術數過百要在神水華池訣離龍爍動迸金星杳杳含光藴至精潜應四時生萬物運窮三載保延齡消鎔碧水飛雲渌火爍金花混氣清鍊出華池逢虎後節符進退變黃輕如斯之訣甚至露矣丹砂其位元非赤四季排來在南宅流珠本性無定居若識其原似秋石丹砂者本只說白金一味元非赤色配位在南方流珠者即是流汞也其性猛急須以秋石製之方可得住秋石味能苦辛酸甜醎五味氣足能具五色古歌曰一物有五彩永作仙人祿日魂月華二氣真含胎育子自堪神變轉欲終君自見分明化作眀窗塵日魂者是太陽之精生在木有火火化而成土土是火之子故云五行火火化為土為之至藥聖人獨知之月華者即是白金名號為玉兔生在水中訣曰月華屬坎自虛行水沃之時得至精精氣遂龍成變化感通兀質應時靈霜飛皎潔凝如雪素體凝新體夜星若鍊真隂逢虎後木龍和會契同情此說一味白金為鼎氣上下兩弦八日上弦金半斤于丁上十五日乾體就三五圎暉二十三日下弦數三五水丰斤有一十六兩一兩有二十四銖計三百八十四銖爻應三百八十四爻為六十四卦一鍊應一爻一年有三百六十日內有二十四氣應天之大數謂之天符其鼎應上下兩弦為之乾坤能生萬物隂符云爰有竒器採氣為之鼎始生萬象金碧云神室者丹之樞紐非世間五金其丹如成狀若明窗塵服之貫入三丹田中是也所以云黃帝得之先固三宮後理萬國自古聖人皆服此藥得道長生更無别藥志士從而行之鉛汞一門不可依金丹祕訣聖無知莫將世上凡鉛汞論年運火競相持鉛者北方之水五行之初其數一其色黑訣云北方黑帝精一身無定形若逢三户物姹女當時驚此物名真汞鉛者生在水中與離氣潜通訣云金不露形汞不呈才聖人訣法象彩玄冥之氣成其妙質為住世之藥聖無知者秋石是也亦名白金能流能滑故非凡物不是世間凡物製造志士如修至藥不用朱砂水銀最為精妙者也本只說白金一味留住玄冥之氣白金與汞是聖人真訣矣天生二物應虛無為妻為子復為夫三五之門唯日月能分卯酉座為初天生二物者即是隂陽二氣聖人以怯象運動火候故名為採火者之異名微妙之氣結實成其王藥即是日月之精日為夫月為妻藥為子子是日月之精人食此精與日月齊年三五者是土木之數三者木也五者土也木中有火火化為土謂之至藥服在中宮能分卯酉卯者東方甲乙位在丙丁酉者西方庭辛金在水中煆鍊之後其色凝白又能食木精所以得金尅木座為初者起自復卦陽爻初生行度至離宮沒在坎宫太陽初出在扶桑上行兊宫沒於西上陽爻漸衰隂爻正王謂之滅沒此數者難申說自古學道之人無一知者要在口訣難以書傳謂之天符大殺之神含養天然禀至神沖和之氣結成身富貴只緣懷五彩心知鉛汞共成親至神之藥是沖和之氣將金養汞以有合無一有一無謂之道有者虎也無者龍也陶真人云鍊空者至於鍊砂鍊砂者合於至道古訣云一物有五彩永作仙人祿只是說此一味白金修鍊之時而有五色光明照目煆鍊得成即見其寶陶真人修寶鍊寶見寶別寶賢人得道謂之真人也乾坤不許相為避志士元知在天地十月養成子母分賢者何曾更運氣乾坤上下釡也上蓋象天金有半斤下坐象地金數三五銖有三百八十四鷹一斤為之乾坤天否地閉水火自生神精現焉不得亂失十月滿足自然成形質者何曽更運其氣藥成體就却入大庚合內周遊赤鳥經營三載其道畢矣人得食者壽同天地玄黃冥寞不可辨鉛汞之門義難顯世人不曉定其原細視至行自然見玄黃者藥之本體名字極多學道者不可辨真假鉛汞之門不可說其原來處學道人切在深會隂陽細視五行自然相見志士相傳父子難遇縱此得其人難體其事不可以意求之縱有學道只是好燒金鍊銀終不求住世長生之道或云終無知此道如此用意去真逺矣嬰兒漠漠不可悟徒以勞神虛見苦但知會得聖人言即是分明上天路愚迷之意不可操持遂用他物修營至道無論年月終無成者自勞其神至於白首如會至人之言准其繩墨修鍊得成上天何難三四同居共一室一二夫妻為偶匹要假良媒方得親遂使交遊情意密三者木神也四者金神也二物為夫婦之道汞入金中同居一室須要良媒良媒者即南方丙丁火神也不知此要虛受辛苦浮沉恍惚性難辨悮取迷徒年月逺欲知靈藥何日成陽數終須歸九轉金沉石浮世人不知解迷徒之人更難親鍊變至九轉極陽之數紅紫射人號為大運之丹豈非容易天機張而不死矣隂陽冥寞不可知靑龍白虎自相持年終變轉自相噉白虎制龍龍漸希隂陽之道難究其原若信百方終無所成成龍虎兩相飮食白虎制龍兩相交持其汞欲飛被水相拘留汞去不得即成至寶也乾天為父坤老母南方朱雀北玄武年終歲久俱成土時人何處尋龍虎乾者為天為父坤者為地為母此意白金為鼎器也南朱雀火神也名為鉛修鍊功畢俱成於土即是龍虎呼吸之理也三人義合同為宗常飮日月照其中已過三花金再液九轉須終歲月功三人者即是水火金三物也其宗祖日者太陽之精月者玉兔之精往來照曜其中留精於鼎內化歸坤室三花者火之異名遇金液不可捨也兩相交會歲月將滿其丹必成也靑龍本質在東宮配合乾坤震位中白虎自兹相見後流珠那肯不相從靑龍者東方甲乙位居震宮其數三其色靑王春之三月汞陽氣能布枝條芳榮天氣下降地氣上騰即木宫中有其父號為靑龍白虎者七殺之神能尅木木龍欲走被金制之不能去也木龍者即是真汞火氣才動漸被收之還被歸本宮故云還丹也金木相返之義龍虎修來五轉強爐中漸覺菊花香如今修鍊正當節莫恨悠悠歲月長夫修大丹志意巖谷休糧停厨書夜精心專思漏刻抽減無差不辭得失希望丹成臨爐瑞應香氣如菊花也欲識丹砂是木精移來西位與金并凡人何處尋蹤跡恍惚中間在杳冥丹砂本是木之精精是離氣故名汞恍恍惚惚其中有物杳杳冥冥其中有精此義深逺難究其根也悟者猶如返岐蹤迷途不易尋路苦三人運合同一原本性何曾離宗祖悟者非難迷途不易三人即水火金三物事同一原唯聖人獨知之矣一人本有一人無金公為婦木為夫玄置深奧不可度志士何曾肯語圖一人有者即是金公也一人無者即是青龍也其義深逺之事學者不可語圖夫學此事者切須勤苦志忘飢罷寢不辭辛勤審察師㫖縱過至人絳日話論自己根性不契至道如何得成志士未得至道之時亦甚茫然及至得了覓人慱付猶萬萬中不遇一人學得之者不可閉其大道矣後來學者心自嗊嗃我慢只求乾銀濟世之寶絳不求濟命之藥如此之人實可痛乎虛棄一世或云終無此道蓋為正氣不真邪氣參雜則與道為隔也此訣三十首句句華秀字字顯理偶以愚情注解其文重疊事同一原令人不用水銀朱砂及五金有質之物修營至道至藥根本不是世間凡物後來學者切冝細詳其事不出象中忝為忠臣孝子不解尋真實為苦哉玄天汪汪配地黃男精和合並同房白液爐中隨月化時人服者瑩心涼天地玄黃是隂陽二氣男精汞也白液者金也合歸一處為之黃白象雞形入鼎燒之然後變色成丹人得食者能殺三尸去九蟲令人無所染謂之真人也金木相傷誰定原五行相返自相連世上共藏隂火白誰能識得黃芽鉛金能尅木木中藏火火能消金五行相返又能相成從子到午是相生自午至戍是相尅如斯相連相返之事合在口訣所傳世間鉛汞不相依志士元知在坎離賢者共藏人不見淮南修祕在華池世間凡鉛汞且藏府無類服者隨滓而下終不入丹田中華池者即神水也訣內華池是白金不載方書訣在心沐浴須傳外氣法陽數還令反作隂金體水銀也非作水銀形鍊藥須通訣無師莫謾施不傳神水法由來歲歲飛九轉丹成歲欲終開爐忽見藥花紅水火變來俱作土時人何處覓金公陽數日滿開爐鼎狀如朝霞其色紅赤黃歸在中宫水火二物俱化成土也鉛汞相傳世所希丹砂玉質雪為衣朦朧只在君家舍日日君看君不知砂汞非赤色古人只說白丹砂亦為名白馬牙砂只是西方金是真也還丹入口身自輕能銷久病去祅精貪愛自兹無所染能改愚人世與情至丹入口三尸並死令人無所染謂之真人也誰悟靈丹出世塵三花合會與龍親君看前後鍊丹者誤煞千人與萬人三花者火也如能運合靑龍自生五行顛倒術龍從火裏出五行不順行虎向水中生將銀投水將水投銀是水是銀元陽子金液集終
